title: "Rhianna's Fiber Arts"
description: "All things fiber fun"
baseurl: ""
url: "https://rhiannasfiberarts.github.io"

# Change these two lines to match your GitHub username and repo name
# Example: if your repo is github.com/janedoe/fiber-blog
#   github_username: janedoe
#   repository: fiber-blog
github_username: rhiannasfiberarts
repository: rhiannasfiberarts.github.io

# Author info (shown in footer)
author:
  name: "Rhianna Lucas"
  bio: "Fiber artist"

# Jekyll settings
markdown: kramdown
permalink: /blog/:year/:month/:day/:title/
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
